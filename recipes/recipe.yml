name: simplyOS
description: Fedora Atomic con Cagebreak

base-image: ghcr.io/wayblueorg/sway:latest
image-version: latest

modules:
  - type: files

  - type: dnf
    install:
      packages:
        # Entorno Wayland (runtime)
        - foot              # Terminal Wayland ligero
        - fuzzel            # Lanzador de aplicaciones (Wayland)
        - waybar            # Barra de estado (Wayland)
        - mako              # Demostrador de notificaciones
        - swaybg            # Gestor de fondo de pantalla Wayland
        - fastfetch         # Herramienta de información del sistema

        # Seguridad (runtime)
        - firewalld         # Firewall dinámico
        - aide              # Sistema de detección de intrusiones
        - fail2ban          # Prevención de intrusiones (SSH, etc.)
        - lynis             # Auditoría de seguridad

        # XWayland (soporte X11 sobre Wayland)
        - xorg-x11-server-Xwayland

        # Dependencias de build
        - git
        - gcc
        - meson
        - ninja-build
        - pkgconf-pkg-config

        - wlroots0.20-devel
        - wayland-devel
        - wayland-protocols-devel
        - libxkbcommon-devel
        - libdisplay-info-devel
        - libdrm-devel
        - libglvnd-devel
        - libinput-devel
        - libliftoff-devel
        - libseat-devel
        - libxcb-devel
        - mesa-libgbm-devel
        - pixman-devel
        - vulkan-loader-devel
        - glslang-devel
        - xcb-util-errors-devel
        - xcb-util-renderutil-devel
        - xcb-util-wm-devel

  - type: script
    no-cache: true
    scripts:
      - files/scripts/build-cagebreak.sh

  - type: dnf
    remove:
      packages:
        # Eliminar dependencias de compilación tras build
        - gcc
        - meson
        - ninja-build
        - pkgconf-pkg-config
        - wlroots0.20-devel
        - wayland-devel
        - wayland-protocols-devel
        - libxkbcommon-devel
        - libdisplay-info-devel
        - libdrm-devel
        - libglvnd-devel
        - libinput-devel
        - libliftoff-devel
        - libseat-devel
        - libxcb-devel
        - mesa-libgbm-devel
        - pixman-devel
        - vulkan-loader-devel
        - glslang-devel
        - xcb-util-errors-devel
        - xcb-util-renderutil-devel
        - xcb-util-wm-devel

  - type: systemd
    system:
      disabled:
        - gdm.service

